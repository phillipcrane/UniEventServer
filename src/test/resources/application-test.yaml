logging:
  level:
    root: WARN
    dk.unievent: WARN
    org.springframework: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
    org.flywaydb: WARN
    org.springdoc: ERROR
    org.hibernate.orm.deprecation: ERROR
    org.hibernate.orm.jdbc.error: OFF
    dk.unievent.app.infrastructure.client: OFF
    dk.unievent.app.api.handler: OFF
    dk.unievent.app.api.controller: OFF
    dk.unievent.app.application.service: OFF
    dk.unievent.app.tools: OFF

spring:
  application:
    name: web
  config:
    import:
      - classpath:db-test.yaml
      - classpath:vault-test.yaml
  jpa:
    show-sql: false
  mail:
    host: localhost
    port: 1025
    username: test@test.com
    password: test-password

management:
  health:
    mail:
      enabled: false

unievent:
  security:
    cookies:
      access-name: auth_access
      refresh-name: auth_refresh
      csrf-name: csrf_token
      access-max-age: 60
      refresh-max-age: 120
      csrf-max-age: 60
      secure: false
      same-site: Strict
      domain: ""
      path: /
    csrf:
      secret: test-csrf-secret-key-1234567890
    jwt:
      secret: 12345678901234567890123456789012
      expiration-ms: 60000
      refresh-secret: abcdefghijklmnopqrstuvwx12345678
      refresh-expiration-ms: 120000
    organizer-key:
      confirmation-secret: test-organizer-key-confirmation-secret-1234567890

resilience4j:
  ratelimiter:
    instances:
      login:
        limitForPeriod: 100000
        limitRefreshPeriod: 1s
      register:
        limitForPeriod: 100000
        limitRefreshPeriod: 1s
      verify-organizer-key:
        limitForPeriod: 100000
        limitRefreshPeriod: 1s
      register-with-key:
        limitForPeriod: 100000
        limitRefreshPeriod: 1s
      refresh-token:
        limitForPeriod: 100000
        limitRefreshPeriod: 1s
      logout:
        limitForPeriod: 100000
        limitRefreshPeriod: 1s
      generate-organizer-key:
        limitForPeriod: 100000
        limitRefreshPeriod: 1s
      media-upload:
        limitForPeriod: 100000
        limitRefreshPeriod: 1s
      place-search:
        limitForPeriod: 100000
        limitRefreshPeriod: 1s
      page-search:
        limitForPeriod: 100000
        limitRefreshPeriod: 1s
      event-create:
        limitForPeriod: 100000
        limitRefreshPeriod: 1s
      event-update:
        limitForPeriod: 100000
        limitRefreshPeriod: 1s
      event-delete:
        limitForPeriod: 100000
        limitRefreshPeriod: 1s
      place-create:
        limitForPeriod: 100000
        limitRefreshPeriod: 1s
      place-update:
        limitForPeriod: 100000
        limitRefreshPeriod: 1s
      place-delete:
        limitForPeriod: 100000
        limitRefreshPeriod: 1s
      page-create:
        limitForPeriod: 100000
        limitRefreshPeriod: 1s
      page-update:
        limitForPeriod: 100000
        limitRefreshPeriod: 1s
      page-delete:
        limitForPeriod: 100000
        limitRefreshPeriod: 1s
