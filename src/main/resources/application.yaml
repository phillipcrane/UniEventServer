spring:
  application:
    name: web
  config:
    import:
      - classpath:db.yaml
      - classpath:vault.yaml
      - classpath:media.yaml
      - classpath:api.yaml
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

logging:
  level:
    root: INFO
    dk.unievent.app: INFO
    dk.unievent.app.infrastructure.client: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/app.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info  # metrics exposed only internally; blocked by SecurityConfig in production
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized

app:
  pagination:
    default-page-size: 20
    max-page-size: 100

unievent:
  security:
    cors:
      allowed-origins: ${UNIEVENT_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,https://localhost}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: Authorization,Content-Type,Accept,X-CSRF-Token
      allow-credentials: true
      max-age: 3600
    cookies:
      access-name: ${UNIEVENT_SECURITY_COOKIE_ACCESS_NAME:auth_access}
      refresh-name: ${UNIEVENT_SECURITY_COOKIE_REFRESH_NAME:auth_refresh}
      csrf-name: ${UNIEVENT_SECURITY_COOKIE_CSRF_NAME:csrf_token}
      access-max-age: ${UNIEVENT_SECURITY_COOKIE_ACCESS_MAX_AGE:86400}
      refresh-max-age: ${UNIEVENT_SECURITY_COOKIE_REFRESH_MAX_AGE:604800}
      csrf-max-age: ${UNIEVENT_SECURITY_COOKIE_CSRF_MAX_AGE:3600}
      secure: ${UNIEVENT_SECURITY_COOKIE_SECURE:true}
      same-site: ${UNIEVENT_SECURITY_COOKIE_SAME_SITE:Strict}
      domain: ${UNIEVENT_COOKIE_DOMAIN:}
      path: /
    csrf:
      secret: ${UNIEVENT_SECURITY_CSRF_SECRET:dev-csrf-secret-key-change-in-production}
    jwt:
      secret: ${UNIEVENT_SECURITY_JWT_SECRET}
      expiration-ms: ${UNIEVENT_SECURITY_JWT_EXPIRATION_MS:86400000}
      refresh-secret: ${UNIEVENT_SECURITY_JWT_REFRESH_SECRET}
      refresh-expiration-ms: ${UNIEVENT_SECURITY_JWT_REFRESH_EXPIRATION_MS:604800000}
    organizer-key:
      expiration-hours: ${UNIEVENT_ORGANIZER_KEY_EXPIRATION_HOURS:24}
      confirmation-token-expiration-minutes: ${UNIEVENT_ORGANIZER_KEY_CONFIRMATION_TOKEN_EXPIRATION_MINUTES:10}
  openapi:
    title: ${UNIEVENT_OPENAPI_TITLE:UniEvent API}
    version: ${UNIEVENT_OPENAPI_VERSION:1.0.0}
    description: Event management API for discovering events at Danish venues and organizers
    contact-name: UniEvent Support
    contact-email: support@unievent.dk
    license-name: MIT
    license-url: https://opensource.org/licenses/MIT
  facebook:
    enabled: ${FACEBOOK_ENABLED:true}
    app-id: ${FACEBOOK_APP_ID:}
    app-secret: ${FACEBOOK_APP_SECRET:}
    redirect-uri: ${FACEBOOK_REDIRECT_URI:http://localhost:8080/api/facebook/callback}
    graph-api-version: ${FACEBOOK_GRAPH_VERSION:v25.0}
    ingestion:
      page-size: ${FACEBOOK_INGESTION_PAGE_SIZE:50}

frontend:
  url: ${FRONTEND_URL:http://localhost}
