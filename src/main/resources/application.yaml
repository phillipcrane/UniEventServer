spring:
  application:
    name: web
  config:
    import:
      - classpath:db.yaml
      - classpath:vault.yaml
      - classpath:media.yaml
      - classpath:api.yaml

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized

unievent:
  security:
    cors:
      allowed-origins: ${UNIEVENT_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600
  openapi:
    title: ${UNIEVENT_OPENAPI_TITLE:UniEvent API}
    version: ${UNIEVENT_OPENAPI_VERSION:1.0.0}
    description: Event management API for discovering events at Danish venues and organizers
    contact-name: UniEvent Support
    contact-email: support@unievent.dk
    license-name: MIT
    license-url: https://opensource.org/licenses/MIT
