spring:
  application:
    name: web
  config:
    import: optional:vault://

  cloud:
    vault:
      enabled: ${SPRING_CLOUD_VAULT_ENABLED:true}
      uri: ${SPRING_CLOUD_VAULT_URI:http://localhost:8200}
      token: ${SPRING_CLOUD_VAULT_TOKEN}
      fail-fast: false
      kv:
        enabled: true
        backend: secret
        default-context: unievent
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/unievent?useSSL=true&serverSslVerification=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

unievent:
  media:
    # directory relative to working directory or absolute path
    location: ${UNIEVENT_MEDIA_LOCATION:/app/media}
