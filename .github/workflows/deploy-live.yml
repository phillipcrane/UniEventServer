name: Deploy Live

on:
  push:
    branches:
      - live
  workflow_dispatch:

concurrency:
  group: deploy-live
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIVE_DEPLOY_SSH_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIVE_DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on remote host
        env:
          DEPLOY_HOST: ${{ secrets.LIVE_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.LIVE_DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.LIVE_DEPLOY_PATH }}
        run: |
          ssh -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "DEPLOY_PATH='${DEPLOY_PATH}' bash -s" <<'EOF'
          set -euo pipefail

          cd "${DEPLOY_PATH}"
          git fetch origin
          git checkout live
          git reset --hard origin/live

          if docker compose version >/dev/null 2>&1; then
            COMPOSE_CMD='docker compose'
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD='docker-compose'
          else
            echo 'Neither docker compose plugin nor docker-compose binary is installed on the server.'
            exit 1
          fi

          ${COMPOSE_CMD} up -d --build --remove-orphans
          ${COMPOSE_CMD} ps
          EOF
