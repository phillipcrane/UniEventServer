name: Deploy Live

on:
  push:
    branches:
      - live
  workflow_dispatch:

concurrency:
  group: deploy-live
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.LIVE_DEPLOY_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIVE_DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on remote host
        env:
          DEPLOY_HOST: ${{ secrets.LIVE_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.LIVE_DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.LIVE_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=20 -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "DEPLOY_PATH='${DEPLOY_PATH}' bash -s" <<'EOF'
          set -euo pipefail

          cd "${DEPLOY_PATH}"
          git fetch origin
          git checkout live
          git reset --hard origin/live

          if docker compose version >/dev/null 2>&1; then
            COMPOSE_CMD='docker compose'
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD='docker-compose'
          else
            echo 'Neither docker compose plugin nor docker-compose binary is installed on the server.'
            exit 1
          fi

          # Enable TCP TIME_WAIT socket reuse: this allows the kernel to recycle
          # ports immediately instead of waiting ~60 seconds (TIME_WAIT state).
          # This is the root cause of "address already in use" when ports are bound
          # by TIME_WAIT sockets even though containers are stopped.
          sudo sysctl -w net.ipv4.tcp_tw_reuse=1 || true
          
          # Full cleanup: stop services, remove containers/volumes, and reset network state
          ${COMPOSE_CMD} down --volumes --remove-orphans || true
          
          # Prune dangling networks that may hold stale bindings
          docker network prune -f || true
          
          # Minimal wait for cleanup to settle, then force remove any stragglers
          sleep 2
          for port in 80 443 8080 8200 3307; do
            docker ps -a --format "table {{.ID}}\t{{.Ports}}" | grep -E ":${port}->" | awk '{print $1}' | xargs -r docker rm -f || true
          done
          
          sleep 1

          # Build and start fresh services
          ${COMPOSE_CMD} up -d --build
          ${COMPOSE_CMD} ps
          EOF
