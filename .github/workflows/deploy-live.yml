name: Deploy Live

on:
  push:
    branches:
      - live
  workflow_dispatch:

concurrency:
  group: deploy-live
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.LIVE_DEPLOY_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIVE_DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven tests
        run: ./mvnw test

      - name: Deploy on remote host
        env:
          DEPLOY_HOST: ${{ secrets.LIVE_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.LIVE_DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.LIVE_DEPLOY_PATH }}
          LETSENCRYPT_EMAIL: ${{ secrets.LIVE_LETSENCRYPT_EMAIL }}
          TLS_DOMAIN: ${{ secrets.LIVE_TLS_DOMAIN }}
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=20 -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "DEPLOY_PATH='${DEPLOY_PATH}' LETSENCRYPT_EMAIL='${LETSENCRYPT_EMAIL}' TLS_DOMAIN='${TLS_DOMAIN}' bash -s" <<'EOF'
          set -euo pipefail

          TLS_DOMAIN="${TLS_DOMAIN:-unievent.dk}"

          cd "${DEPLOY_PATH}"
          git fetch origin
          git checkout live
          git reset --hard origin/live

          if [ ! -f .env ]; then
            echo 'Missing .env in deploy path. Refusing to continue.'
            exit 1
          fi

          if docker compose version >/dev/null 2>&1; then
            COMPOSE_CMD='docker compose'
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD='docker-compose'
          else
            echo 'Neither docker compose plugin nor docker-compose binary is installed on the server.'
            exit 1
          fi

          # Validate compose file before touching running services.
          ${COMPOSE_CMD} config -q

          # HTTPS nginx requires an existing certificate in the letsencrypt volume.
          # Bootstrap certificate automatically on first deploy.
          if ! ${COMPOSE_CMD} run --rm --no-deps --entrypoint /bin/sh certbot -c "test -f /etc/letsencrypt/live/${TLS_DOMAIN}/fullchain.pem && test -f /etc/letsencrypt/live/${TLS_DOMAIN}/privkey.pem"; then
            if [ -z "${LETSENCRYPT_EMAIL:-}" ]; then
              echo 'Missing TLS certificate and LIVE_LETSENCRYPT_EMAIL secret is not set.'
              echo 'Set LIVE_LETSENCRYPT_EMAIL in GitHub Actions secrets and rerun deployment.'
              exit 1
            fi

            echo "TLS certificate for ${TLS_DOMAIN} not found. Bootstrapping certificate issuance..."
            BOOTSTRAP_OVERRIDE="$(mktemp)"
            printf '%s\n' \
              'services:' \
              '  nginx:' \
              '    volumes:' \
              '      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro' \
              > "${BOOTSTRAP_OVERRIDE}"

            # Start temporary HTTP-only edge for ACME webroot challenge.
            ${COMPOSE_CMD} -f docker-compose.yml -f "${BOOTSTRAP_OVERRIDE}" up -d nginx certbot app mysql vault

            # Request initial certificate.
            if ! ${COMPOSE_CMD} run --rm --entrypoint certbot certbot certonly --webroot -w /var/www/certbot -d "${TLS_DOMAIN}" --agree-tos --no-eff-email -m "${LETSENCRYPT_EMAIL}"; then
              echo 'Certificate bootstrap failed. Debug logs:'
              ${COMPOSE_CMD} -f docker-compose.yml -f "${BOOTSTRAP_OVERRIDE}" logs --no-color --tail=120 nginx certbot || true
              ${COMPOSE_CMD} -f docker-compose.yml -f "${BOOTSTRAP_OVERRIDE}" down --remove-orphans || true
              rm -f "${BOOTSTRAP_OVERRIDE}" || true
              exit 1
            fi

            ${COMPOSE_CMD} -f docker-compose.yml -f "${BOOTSTRAP_OVERRIDE}" down --remove-orphans || true
            rm -f "${BOOTSTRAP_OVERRIDE}" || true
          fi

          # Stop and replace only this stack; keep persistent volumes/data.
          ${COMPOSE_CMD} down --remove-orphans || true

          # If host processes (not containers) still occupy ports, fail early with diagnostics.
          host_port_in_use=0
          if command -v ss >/dev/null 2>&1; then
            if ss -H -ltn '( sport = :80 or sport = :443 )' | grep -q .; then
              host_port_in_use=1
            fi
          elif command -v lsof >/dev/null 2>&1; then
            if lsof -nP -iTCP:80 -sTCP:LISTEN >/dev/null 2>&1 || lsof -nP -iTCP:443 -sTCP:LISTEN >/dev/null 2>&1; then
              host_port_in_use=1
            fi
          fi

          if [ "${host_port_in_use}" -eq 1 ]; then
            echo 'Ports 80/443 are still in use by a host process after container cleanup.'
            echo 'Host diagnostics:'
            if command -v ss >/dev/null 2>&1; then
              ss -H -ltnp '( sport = :80 or sport = :443 )' || true
            fi
            if command -v lsof >/dev/null 2>&1; then
              lsof -nP -iTCP:80 -sTCP:LISTEN || true
              lsof -nP -iTCP:443 -sTCP:LISTEN || true
            fi

            if command -v systemctl >/dev/null 2>&1; then
              if systemctl is-active --quiet apache2; then
                echo 'Detected active apache2 service holding web ports.'
                echo 'Run once on server: sudo systemctl disable --now apache2'
                echo 'Then rerun deployment.'
              fi
            fi
            exit 1
          fi

          # Build and start fresh services for this stack only.
          ${COMPOSE_CMD} up -d --build --remove-orphans

          # Verify edge service is reachable after startup.
          if command -v curl >/dev/null 2>&1; then
            if ! curl -fsS --max-time 10 http://127.0.0.1/ >/dev/null; then
              echo 'Nginx did not respond on http://127.0.0.1/ after deployment.'
              ${COMPOSE_CMD} ps
              ${COMPOSE_CMD} logs --no-color --tail=120 nginx app || true
              exit 1
            fi
          fi

          ${COMPOSE_CMD} ps
          EOF
