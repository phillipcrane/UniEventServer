services:
  mysql:
    image: mysql:8.4
    container_name: unievent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - unievent-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -P 3306 --protocol=TCP -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      start_period: 40s
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unievent-app
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/unievent?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      UNIEVENT_MEDIA_LOCATION: /app/media

    expose:
      - "8080"
    volumes:
      - media-data:/app/media
    networks:
      - unievent-network

  certbot:
    image: certbot/certbot:latest
    container_name: unievent-certbot
    entrypoint: /bin/sh
    command:
      - -c
      - trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /var/www/certbot --quiet; done
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    networks:
      - unievent-network
    restart: unless-stopped

  nginx:
    image: nginx:1.28.2-alpine
    container_name: unievent-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-https.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    networks:
      - unievent-network

  vault:
    image: hashicorp/vault:1.21
    container_name: unievent-vault
    command: vault server -config=/vault/config/vault.hcl
    environment:
      VAULT_ADDR: http://0.0.0.0:8200
    ports:
      - "127.0.0.1:8200:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - ./vault/config:/vault/config:ro
      - vault-data:/vault/file
    networks:
      - unievent-network
    healthcheck:
      test: ["CMD-SHELL", "vault status -format=json > /dev/null 2>&1; code=$$?; [ $$code -eq 0 ] || [ $$code -eq 2 ]"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  media-data:
  vault-data:
  letsencrypt:
  certbot-www:

networks:
  unievent-network:
    driver: bridge
