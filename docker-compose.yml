version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: unievent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - unievent-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unievent-app
    depends_on:
      mysql:
        condition: service_healthy
      vault:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/unievent?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_CLOUD_VAULT_URI: http://vault:8200
      SPRING_CLOUD_VAULT_TOKEN: ""
    ports:
      - "8080:8080"
    networks:
      - unievent-network

  vault:
    image: hashicorp/vault:1.15
    container_name: unievent-vault
    # write VAULT_LOCAL_CONFIG into /vault/config/vault.hcl at container start, then run vault
    command: sh -c 'mkdir -p /vault/config && echo "$$VAULT_LOCAL_CONFIG" > /vault/config/vault.hcl && vault server -config=/vault/config/vault.hcl'
    environment:
      VAULT_ADDR: http://0.0.0.0:8200
      VAULT_LOCAL_CONFIG: >-
        {"storage":{"file":{"path":"/vault/file"}},"listener":{"tcp":{"address":"0.0.0.0:8200","tls_disable":true}},"ui":true,"api_addr":"http://vault:8200"}
    ports:
      - "127.0.0.1:8200:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/file
    networks:
      - unievent-network
    healthcheck:
      test: ["CMD-SHELL", "vault status -format=json || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  vault-data:

networks:
  unievent-network:
    driver: bridge
