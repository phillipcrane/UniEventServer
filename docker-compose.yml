services:
  mysql:
    image: mysql:8.4.9
    container_name: unievent-mysql
    deploy:
      resources:
        limits:
          memory: 512m
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - unievent-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -P 3306 --protocol=TCP -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      start_period: 40s
      interval: 10s
      timeout: 5s
      retries: 5

  weed-master:
    image: chrislusf/seaweedfs:4.22
    container_name: unievent-weed-master
    command: master -ip=weed-master
    ports:
      - "127.0.0.1:9333:9333"
    networks:
      - unievent-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9333/dir/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  weed-volume:
    image: chrislusf/seaweedfs:4.22
    container_name: unievent-weed-volume
    command: volume -master weed-master:9333 -port 8080 -ip=weed-volume
    depends_on:
      weed-master:
        condition: service_healthy
    volumes:
      - seaweedfs-data:/data
    networks:
      - unievent-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://weed-volume:8080/status || exit 1"]
      start_period: 15s
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unievent-app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768m
    depends_on:
      mysql:
        condition: service_healthy
      vault:
        condition: service_healthy
      weed-master:
        condition: service_healthy
      weed-volume:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/unievent?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      UNIEVENT_MEDIA_SEAWEEDFS_MASTER_URL: ${SEAWEEDFS_MASTER_URL:-weed-master:9333}
      UNIEVENT_MEDIA_SEAWEEDFS_VOLUME_URL: ${SEAWEEDFS_VOLUME_URL:-http://weed-volume:8080}
      UNIEVENT_SECURITY_JWT_SECRET: ${UNIEVENT_SECURITY_JWT_SECRET}
      UNIEVENT_SECURITY_JWT_EXPIRATION_MS: ${UNIEVENT_SECURITY_JWT_EXPIRATION_MS}
      UNIEVENT_SECURITY_JWT_REFRESH_SECRET: ${UNIEVENT_SECURITY_JWT_REFRESH_SECRET}
      UNIEVENT_SECURITY_JWT_REFRESH_EXPIRATION_MS: ${UNIEVENT_SECURITY_JWT_REFRESH_EXPIRATION_MS}
      UNIEVENT_ORGANIZER_KEY_CONFIRMATION_SECRET: ${UNIEVENT_ORGANIZER_KEY_CONFIRMATION_SECRET}
      UNIEVENT_SECURITY_CSRF_SECRET: ${UNIEVENT_SECURITY_CSRF_SECRET}
      UNIEVENT_SECURITY_CORS_ALLOWED_ORIGINS: ${UNIEVENT_SECURITY_CORS_ALLOWED_ORIGINS:-}
      UNIEVENT_COOKIE_DOMAIN: ${UNIEVENT_COOKIE_DOMAIN:-}
      FACEBOOK_ENABLED: ${FACEBOOK_ENABLED}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
      FACEBOOK_REDIRECT_URI: ${FACEBOOK_REDIRECT_URI:-http://localhost:8080/api/facebook/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      FACEBOOK_GRAPH_VERSION: ${FACEBOOK_GRAPH_VERSION:-v25.0}
      VAULT_ENABLED: ${VAULT_ENABLED:-true}
      VAULT_URI: ${VAULT_URI:-https://vault:8200}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_SECRET_PATH: ${VAULT_SECRET_PATH:-secret/data/unievent}
      VAULT_CACERT_PATH: /etc/vault-ca/vault.crt
    volumes:
      - ./certs/vault.crt:/etc/vault-ca/vault.crt:ro
      - logs:/app/logs
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - unievent-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      start_period: 60s
      interval: 15s
      timeout: 5s
      retries: 5

  certbot:
    image: certbot/certbot:v5.5.0
    container_name: unievent-certbot
    entrypoint: /bin/sh
    command:
      - -c
      - trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /var/www/certbot --quiet; done
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    networks:
      - unievent-network
    restart: unless-stopped

  nginx:
    image: nginx:1.30.0-alpine
    container_name: unievent-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-https.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    networks:
      - unievent-network

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-}
        VITE_FACEBOOK_APP_ID: ${VITE_FACEBOOK_APP_ID:-}
    container_name: unievent-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - unievent-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health | grep -q healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:2.0.0
    container_name: unievent-vault
    command: vault server -config=/vault/config/vault.hcl
    environment:
      VAULT_ADDR: https://127.0.0.1:8200
      VAULT_CACERT: /vault/tls/tls.crt
      SKIP_CHOWN: "true"
      SKIP_SETCAP: "true"
    ports:
      - "127.0.0.1:8200:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - ./vault/config:/vault/config:ro
      - ./certs/vault.crt:/vault/tls/tls.crt:ro
      - ./certs/vault.key:/vault/tls/tls.key:ro
      - vault-data:/vault/file
    networks:
      - unievent-network
    healthcheck:
      test: ["CMD-SHELL", "vault status -format=json > /dev/null 2>&1; code=$$?; [ $$code -eq 0 ] || [ $$code -eq 2 ]"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  seaweedfs-data:
  vault-data:
  letsencrypt:
  certbot-www:
  logs:

networks:
  unievent-network:
    driver: bridge
